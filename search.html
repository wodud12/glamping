  <!-- section 01 -->

  <section class="section01">
    <div class="section01_main">
      <img src="assets/imges/search_bg.png" alt="search_bg">
    </div>
    <div class="container section01_container">
      <div class="col-md-12 sec01_title">
        <h4  class="animate__animated animate__fadeInDown">BADARO GLAMPING</h4>
      </div>
      <div class="row bg-white gy-3 sec01_text">
        <div class="col-xl-12 col-sm-12">
          <div class="text_top">
            <p>
              국내숙소
            </p>
          </div>
        </div>
        <div class="col-xl-4 col-sm-12">
          <div class="text_bottom">
            <img src="assets/imges/search.png" alt="검색아이콘">
            <input type="choose" placeholder="인천광역시">
          </div>
        </div>
        <div class="col-xl-4 col-sm-12">
          <div class="text_bottom">
            <img src="assets/imges/cal.png" alt="달력아이콘">

          </div>
        </div>
        <div class="col-xl-2 col-sm-12">
          <div class="text_bottom_user">
            <img src="assets/imges/user.png" alt="사람아이콘">
            <input type="number" width="50px" placeholder="인원 : 1">
          </div>
        </div>
        <div class="col-xl-2 col-sm-12">
          <button type="button" onClick="location.href='PAGENAME.html'" class="sec01_btn">
            검색
          </button>
        </div>
      </div>
    </div>

  <section class="section02">
    <div class="container">
      <div class="row">
        <div class="col-md-11 d-flex justify-content-between">
          <div class="sec02_img_box">
            <img src="assets/imges/search1.png" alt="search1">
            <button>자세히보기</button>
          </div>
          <div class="sec02_title">
            <p class="sec02_text01">인천광역시 강화군</p>

            <img src="assets/imges/search_icon.png" alt="search_icon">
          </div>
        </div>
        <div class="col-md-1">
          <div class="sec02_reserve">
            <p>예약하기</p>
            <img src="assets/imges/search_icon_right.png" alt="search_icon_right">
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-md-11 d-flex justify-content-between">
          <div class="sec02_img_box">
            <img src="assets/imges/search2.png" alt="search2">
            <button>자세히보기</button>
          </div>
          <div class="sec02_title">
            <p class="sec02_text01">인천광역시 남동구</p>
