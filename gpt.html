<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glamping Layout</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQ3FdjH5xYhOeF6k9KKbU6l2h7CjE/93hXQ5Qc5cfp5RRa4L47lZLhrxM" crossorigin="anonymous">
  
  <!-- Your Custom CSS -->

</head>
<style>
    .section03 {
      width: 100%;
      padding-top: 120px;
      background-color: #fff;
    }
  
    .section03_container {
      max-width: 1296px;
      margin: 90px auto 0;
    }
  
    .section03_image1 {
      width: 100%;
      height: auto;
      object-fit: cover;
      border-radius: 8px;
    }
  
    .section03_image2 {
      width: 100%;
      height: auto;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 16px;
    }
  
    .section03_p1 {
      font-size: 34px;
      line-height: 28px;
      font-weight: 600;
      color: #3DAD72;
      margin-bottom: 20px;
    }
  
    .section03_p2 {
      font-size: 22px;
      line-height: 28px;
      font-weight: 500;
      color: #3DAD72;
      margin-bottom: 100px;
    }
  </style>
<body>


  
 <section class="section01">
  <div class="container section01_container">
    <div class="sec01_title col-md-12">
      <h4>인천 인기 글램핑 찾기</h4>
      <p>여행 일정을 선택하고 특가를 확인하세요!</p>
    </div>
    <div class="row bg-white sec01_text">
      <div class="col-md-12 t1">
        <div>국내숙소</div>
      </div>
      <div class="col-md-3 t2">
        <img src="assets/imges/search.png" alt="">
        <p id="location">인천광역시</p>
      </div>
      <div class="col-md-4 t3">
        <img src="assets/imges/cal.png" alt="">
        <p id="date">04월29일 - 04월30일 (1박)</p>
      </div>
      <div class="col-md-3 t4">
        <img src="assets/imges/user.png" alt="">
        <p id="people">인원 2</p>
      </div>
      <div class="col-md-2 t5">
        <button id="searchBtn" class="btn btn-primary">검색</button>
      </div>
    </div>
  </div>
</section>
  




    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-Qm6lWz9iyQvsYeC+Ov8dKK3YQJh0I5tw+d/mIC9GtzqK3g9rbpsv8pXeNH2YFHYp" crossorigin="anonymous"></script>
</body>
</html>
