<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glamping Layout</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQ3FdjH5xYhOeF6k9KKbU6l2h7CjE/93hXQ5Qc5cfp5RRa4L47lZLhrxM" crossorigin="anonymous">
  
  <!-- Your Custom CSS -->

</head>
<style>
    .section03 {
      width: 100%;
      padding-top: 120px;
      background-color: #fff;
    }
  
    .section03_container {
      max-width: 1296px;
      margin: 90px auto 0;
    }
  
    .section03_image1 {
      width: 100%;
      height: auto;
      object-fit: cover;
      border-radius: 8px;
    }
  
    .section03_image2 {
      width: 100%;
      height: auto;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 16px;
    }
  
    .section03_p1 {
      font-size: 34px;
      line-height: 28px;
      font-weight: 600;
      color: #3DAD72;
      margin-bottom: 20px;
    }
  
    .section03_p2 {
      font-size: 22px;
      line-height: 28px;
      font-weight: 500;
      color: #3DAD72;
      margin-bottom: 100px;
    }
  </style>
<body>
<!-- HTML + CSS 통합 버전 -->

  
  <div class="section03">
    <div class="container section03_container">
      <div class="row">
        <!-- 왼쪽: 메인 이미지 -->
        <div class="col-md-6">
          <img class="section03_image1 img-fluid" src="assets/imges/glam4.png" alt="메인 이미지">
        </div>
  
        <!-- 오른쪽: 3개 이미지 -->
        <div class="col-md-6">
          <div class="row">
            <div class="col-6">
              <img class="section03_image2 img-fluid" src="assets/imges/glam5.png" alt="서브 이미지1">
            </div>
            <div class="col-6">
              <img class="section03_image2 img-fluid" src="assets/imges/glam6.png" alt="서브 이미지2">
            </div>
          </div>
          <div class="row">
            <div class="col-12">
              <img class="section03_image2 img-fluid" src="assets/imges/glam7.png" alt="서브 이미지3">
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-Qm6lWz9iyQvsYeC+Ov8dKK3YQJh0I5tw+d/mIC9GtzqK3g9rbpsv8pXeNH2YFHYp" crossorigin="anonymous"></script>
</body>
</html>
